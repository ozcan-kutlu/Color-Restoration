# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → Repoyu bağla.
#
# plan: free — Ücretsiz web servisi (uyku: ~15 dk hareketsizlikten sonra; uyanınca ~1 dk sürebilir).
# Free planda Persistent Disk yok; model dosyası imaja dahil edilmeli veya başlangıçta indirilmeli.
# backend/.dockerignore içinde models/*.keras satırını kaldırıp modeli build context’e ekleyebilirsin
# (model repoda olmamalıysa GitHub Actions + artifact veya gizli URL ile indirme kullan).
#
# Not: Render dokümantasyonuna göre `free` planı özel (private) repolar için kullanılamayabilir.

services:
  - type: web
    name: color-restoration-api
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: CR_ENVIRONMENT
        value: prod
      - key: CR_MODEL_PATH
        value: models/colorization.keras
      # Vercel URL’inizi buraya yazın (Swagger / doğrudan fetch için):
      # - key: CR_CORS_ORIGINS
      #   value: https://your-app.vercel.app
