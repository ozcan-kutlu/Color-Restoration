# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → Repoyu bağla.
#
# plan: free — uyku: ~15 dk hareketsizlik; ilk istek yavaş olabilir.
# Model: repoda .keras yoksa ZORUNLU — Dashboard → Environment → CR_MODEL_DOWNLOAD_URL
# (ör. GitHub Release asset’inin doğrudan indirme linki, public S3/R2 URL). Google Drive “paylaş” linki çoğunlukla işe yaramaz.
#
# Private repo: Render’da `free` kısıtı olabilir.

services:
  - type: web
    name: color-restoration-api
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: CR_ENVIRONMENT
        value: prod
      - key: CR_MODEL_PATH
        value: models/colorization.keras
      # Zorunlu (model repoda yok): gerçek URL’yi Render panelinden ekle.
      # - key: CR_MODEL_DOWNLOAD_URL
      #   value: https://github.com/.../releases/download/v1/colorization.keras
      # Vercel URL’inizi buraya yazın (Swagger / doğrudan fetch için):
      # - key: CR_CORS_ORIGINS
      #   value: https://your-app.vercel.app
